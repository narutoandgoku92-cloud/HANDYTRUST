name: handy_trust
description: "HandyTrust - Nigeria's trusted service marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5

  # State management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^13.0.0

  # Firebase
  firebase_core: ^2.13.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.9.0
  firebase_storage: ^11.0.0
  firebase_messaging: ^14.0.0
  cloud_functions: ^4.6.0

  # Networking
  dio: ^5.9.2

  # Security
  flutter_secure_storage: ^9.0.0

  # Media
  flutter_image_compress: ^2.2.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Payments (Paystack via WebView + REST)
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI / Animations
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  timeago: ^3.7.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.2

  # Notifications
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-VariableFont_opsz,wght.ttf  